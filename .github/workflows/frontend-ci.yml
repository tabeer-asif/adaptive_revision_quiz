name: Frontend CI

on:
  push:
    paths:
      - quiz-frontend/**
      - .github/workflows/frontend-ci.yml
  pull_request:
    paths:
      - quiz-frontend/**
      - .github/workflows/frontend-ci.yml

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: quiz-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: quiz-frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests if present
        run: npm test -- --watchAll=false --passWithNoTests
